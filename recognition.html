<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Face Recognition</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #0f172a;
      color: #f8fafc;
      font-family: 'Inter', sans-serif;
    }
    .navbar-custom {
      background: linear-gradient(135deg, #0b2a52 0%, #2866a8 100%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .navbar-custom .navbar-brand,
    .navbar-custom .nav-link {
      color: #ffffff !important;
    }
    .navbar-custom .nav-link:hover,
    .navbar-custom .nav-link.active {
      color: #d1e8ff !important;
    }
    .container-shell {
      width: 100%;
      max-width: 1160px;
      margin: 0 auto;
      padding: 24px;
    }
    .page-grid {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 28px;
      align-items: start;
    }
    .card-simple {
      background: #111827;
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 1rem;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      height: 100%;
    }
    .card-simple .card-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      height: 100%;
    }
    .video-frame {
      position: relative;
      width: 100%;
      min-height: 520px;
      border-radius: 1rem;
      overflow: hidden;
      background: #000;
    }
    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 24px;
      height: 100%;
    }
    .detail-panel {
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 1rem;
      padding: 24px;
      min-height: 520px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .detail-panel h3 {
      margin-bottom: 1rem;
      color: #f8fafc;
    }
    .detail-item {
      margin-bottom: 1rem;
    }
    .detail-item dt {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 0.35rem;
    }
    .detail-item dd {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      color: #f8fafc;
    }
    @media (max-width: 992px) {
      .container-shell {
        padding: 16px;
      }
      .page-grid {
        grid-template-columns: 1fr;
      }
      .video-frame {
        min-height: 320px;
      }
      .detail-panel {
        min-height: auto;
      }
    }
    .detail-panel h3 {
      margin-bottom: 1rem;
      color: #f8fafc;
    }
    .detail-item {
      margin-bottom: 1rem;
    }
    .detail-item dt {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 0.35rem;
    }
    .detail-item dd {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      color: #f8fafc;
    }
    #liveCamera {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }
    .button-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.75rem;
      margin-top: 1.5rem;
    }
    .result-box {
      margin-top: 1.5rem;
      padding: 1.25rem;
      border-radius: 1rem;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.18);
    }
    .match-details {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 0.85rem;
      background: rgba(30, 41, 59, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.12);
    }
    .match-details dt {
      font-size: 0.85rem;
      color: #94a3b8;
    }
    .match-details dd {
      margin: 0 0 0.75rem 0;
      color: #f8fafc;
      font-weight: 600;
    }
    .result-label {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 0.5rem;
    }
    .result-text {
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.4;
      color: #f8fafc;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 0.55rem 0.85rem;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 999px;
    }
    #matchedPhoto {
      max-height: 280px;
      width: auto;
      max-width: 100%;
      object-fit: cover;
      border: 1px solid rgba(148, 163, 184, 0.15);
    }
    .small-note {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-top: 0.75rem;
    }
    @media (max-width: 992px) {
      .page-grid {
        grid-template-columns: 1fr;
      }
      .video-frame {
        min-height: 320px;
      }
      .detail-panel {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #0b2a52 0%, #2866a8 100%);">
    <div class="container-fluid">
      <a class="navbar-brand" href="/dashboard">Police Clearance System</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#recognitionNav" aria-controls="recognitionNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="recognitionNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/add_criminal">Add Criminal</a></li>
          <li class="nav-item"><a class="nav-link" href="/records">Records</a></li>
          <li class="nav-item"><a class="nav-link" href="/search">Search</a></li>
          <li class="nav-item"><a class="nav-link text-danger" href="/logout">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="container-shell">
    <div class="page-grid">
      <div class="card-simple">
        <div class="card-body">
          <h2 class="h4 mb-3">Face Recognition</h2>
          <div class="video-frame">
            <video id="liveCamera" autoplay muted playsinline></video>
          </div>
          <div class="button-row">
            <button id="startCamera" class="btn btn-outline-light">Start Camera</button>
            <button id="captureFace" class="btn btn-primary" disabled>Recognize Face</button>
            <button id="stopCamera" class="btn btn-secondary" disabled>Stop Camera</button>
          </div>
        </div>
      </div>

      <div class="right-panel">
        <div class="detail-panel">
          <div>
            <h3>Recognition Result</h3>
            <div class="result-box">
              <div class="result-label">Status</div>
              <span id="statusBadge" class="status-badge bg-secondary">Idle</span>
              <div id="matchedPhotoWrapper" class="mt-3 d-none text-center">
                <img id="matchedPhoto" src="" alt="Matched person photo" class="img-fluid rounded shadow-sm" />
              </div>
              <div id="resultText" class="result-text">{{ person.status_text }}</div>
              <div id="statusDetail" class="small-note">{{ person.name }} — {{ person.crime }}</div>
            </div>
          </div>
          <div>
            <button id="showDetailsBtn" class="btn btn-outline-info btn-sm mt-3 d-none">Show Details</button>
            <div id="matchedDetails" class="match-details d-none">
              <dl>
                <div class="detail-item">
                  <dt>Name</dt>
                  <dd id="matchedName">-</dd>
                </div>
                <div class="detail-item">
                  <dt>Crime</dt>
                  <dd id="matchedCrime">-</dd>
                </div>
                <div class="detail-item">
                  <dt>Case Number</dt>
                  <dd id="matchedCase">-</dd>
                </div>
                <div class="detail-item">
                  <dt>Status</dt>
                  <dd id="matchedStatus">-</dd>
                </div>
                <div class="detail-item">
                  <dt>Confidence</dt>
                  <dd id="matchedConfidence">-</dd>
                </div>
                <div class="detail-item">
                  <dt>Arrest Date</dt>
                  <dd id="matchedArrestDate">-</dd>
                </div>
              </dl>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const video = document.getElementById('liveCamera');
    const startButton = document.getElementById('startCamera');
    const captureButton = document.getElementById('captureFace');
    const stopButton = document.getElementById('stopCamera');
    const resultText = document.getElementById('resultText');
    const statusDetail = document.getElementById('statusDetail');
    const showDetailsBtn = document.getElementById('showDetailsBtn');
    const matchedDetails = document.getElementById('matchedDetails');
    const matchedName = document.getElementById('matchedName');
    const matchedCrime = document.getElementById('matchedCrime');
    const matchedCase = document.getElementById('matchedCase');
    const matchedStatus = document.getElementById('matchedStatus');
    const matchedConfidence = document.getElementById('matchedConfidence');
    const matchedArrestDate = document.getElementById('matchedArrestDate');
    const statusBadge = document.getElementById('statusBadge');
    const recognitionAvailable = {{ 'true' if recognition_available else 'false' }};
    let cameraStream = null;

    function setResult(text, detail = '') {
      resultText.textContent = text;
      statusDetail.textContent = detail;
    }

    function setBadge(status) {
      statusBadge.textContent = status;
      statusBadge.className = 'status-badge';
      if (status === 'Matched') {
        statusBadge.classList.add('bg-success');
      } else if (status === 'No Match') {
        statusBadge.classList.add('bg-danger');
      } else if (status === 'No Face' || status === 'Recognition failed' || status === 'Unable to access camera') {
        statusBadge.classList.add('bg-warning', 'text-dark');
      } else if (status === 'Unavailable') {
        statusBadge.classList.add('bg-secondary');
      } else {
        statusBadge.classList.add('bg-info');
      }
    }

    const matchedPhotoWrapper = document.getElementById('matchedPhotoWrapper');
    const matchedPhoto = document.getElementById('matchedPhoto');

    function resetDetails() {
      showDetailsBtn.classList.add('d-none');
      matchedDetails.classList.add('d-none');
      matchedPhotoWrapper.classList.add('d-none');
      matchedPhoto.src = '';
      matchedName.textContent = '-';
      matchedCrime.textContent = '-';
      matchedCase.textContent = '-';
      matchedStatus.textContent = '-';
      matchedConfidence.textContent = '-';
      matchedArrestDate.textContent = '-';
      showDetailsBtn.textContent = 'Show Details';
    }

    function updateMatchedDetails(result) {
      matchedName.textContent = result.name || 'Unknown';
      matchedCrime.textContent = result.crime || 'Unknown';
      matchedCase.textContent = result.case_number || 'N/A';
      matchedStatus.textContent = result.record_status || 'N/A';
      matchedConfidence.textContent = result.confidence || '0%';
      matchedArrestDate.textContent = result.arrest_date || 'N/A';
      if (result.photo_url) {
        matchedPhoto.src = result.photo_url;
        matchedPhotoWrapper.classList.remove('d-none');
      } else {
        matchedPhotoWrapper.classList.add('d-none');
        matchedPhoto.src = '';
      }
      showDetailsBtn.classList.remove('d-none');
      matchedDetails.classList.remove('d-none');
      showDetailsBtn.textContent = 'Hide Details';
    }

    async function recognizeCapturedFrame(blob) {
      const formData = new FormData();
      formData.append('image', blob, 'capture.jpg');

      const response = await fetch('/recognize_image', {
        method: 'POST',
        body: formData,
      });

      if (!response.ok) {
        const error = await response.json().catch(() => ({ error: response.statusText }));
        return error;
      }

      return response.json();
    }

    async function captureAndRecognize() {
      if (!video.videoWidth || !video.videoHeight) {
        setResult('Camera not ready', 'Please wait for the video preview.');
        return;
      }

      captureButton.disabled = true;
      captureButton.textContent = 'Recognizing...';

      const captureCanvas = document.createElement('canvas');
      captureCanvas.width = video.videoWidth;
      captureCanvas.height = video.videoHeight;
      captureCanvas.getContext('2d').drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);

      captureCanvas.toBlob(async (blob) => {
        if (!blob) {
          setResult('Capture failed', 'Please try again.');
          captureButton.disabled = false;
          captureButton.textContent = 'Recognize Face';
          return;
        }

        const result = await recognizeCapturedFrame(blob);
        if (result && !result.error) {
          const label = result.status === 'Matched' ? `Matched: ${result.name}` : 'No Match';
          setResult(label, `${result.crime || 'No criminal record'} • ${result.confidence || '0%'}`);
          setBadge(result.status || 'Unknown');
          if (result.status === 'Matched') {
            updateMatchedDetails(result);
          } else {
            resetDetails();
          }
        } else {
          const errorText = result.detail || result.error || 'Recognition failed';
          setResult(errorText, result.detail ? '' : 'Check the camera and try again.');
          setBadge('Recognition failed');
          resetDetails();
        }

        captureButton.disabled = false;
        captureButton.textContent = 'Recognize Face';
      }, 'image/jpeg', 0.8);
    }

    if (!recognitionAvailable) {
      startButton.disabled = true;
      captureButton.disabled = true;
      stopButton.disabled = true;
      setResult('Face recognition unavailable', 'Install face_recognition and opencv-python on the server.');
    }

    showDetailsBtn.addEventListener('click', () => {
      if (matchedDetails.classList.contains('d-none')) {
        matchedDetails.classList.remove('d-none');
        showDetailsBtn.textContent = 'Hide Details';
      } else {
        matchedDetails.classList.add('d-none');
        showDetailsBtn.textContent = 'Show Details';
      }
    });

    startButton.addEventListener('click', async () => {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 }, audio: false });
        video.srcObject = cameraStream;
        captureButton.disabled = false;
        stopButton.disabled = false;
        setResult('Camera ready', 'Tap Recognize Face to capture.');
      } catch (err) {
        console.error(err);
        setResult('Unable to access camera', 'Allow camera permission or use a supported browser.');
      }
    });

    stopButton.addEventListener('click', () => {
      if (!cameraStream) {
        return;
      }
      cameraStream.getTracks().forEach((track) => track.stop());
      cameraStream = null;
      video.srcObject = null;
      captureButton.disabled = true;
      stopButton.disabled = true;
      setResult('Camera stopped', 'Start the camera again to continue.');
    });

    captureButton.addEventListener('click', captureAndRecognize);
  </script>
</body>
</html>
